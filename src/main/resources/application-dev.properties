spring.config.activate.on-profile=dev

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/event_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:password}

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=true

# ================== SECURITY ==================
spring.security.user.name=${ADMIN_USERNAME:anuj}
spring.security.user.password=${ADMIN_PASSWORD:password}

# ================== OAUTH ==================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test}
spring.security.oauth2.client.registration.google.scope=email,profile

cloudinary.cloud_name=${IMAGE_CLOUD_NAME}
cloudinary.api_key=${IMAGE_CLOUD_API_KEY}
cloudinary.api_secret=${IMAGE_CLOUD_SECRET}