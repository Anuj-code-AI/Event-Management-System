<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Moments — Eventaura</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3C9FCSTWY3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-3C9FCSTWY3');
    </script>
    <style>
        body {
            background: #08080f;
            color: #fff;
        }

        .moments-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px;
            text-align: center;
        }

        .moments-card {
            max-width: 700px;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(255,77,109,0.15);
            border: 1px solid rgba(255,77,109,0.3);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .moments-card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .moments-card p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 40px;
        }

        .gallery-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 40px;
        }

        .gallery-preview div {
            height: 100px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff4d6d, #ffa500);
            opacity: 0.6;
        }

        .cta {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-main {
            padding: 12px 24px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff4d6d, #d63651);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-secondary {
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            text-decoration: none;
        }

        @media(max-width:600px){
            .gallery-preview {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

<!-- HEADER SAME AS YOUR INDEX -->
<header class="header">
    <div class="logo">
        <span class="logo-text">Event<em>aura</em></span>
    </div>
    <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/moments">Moments</a>
        <a href="/tickets">Tickets</a>
        <a href="/aboutUs">About Us</a>
    </nav>
</header>

<!-- MAIN -->
<section class="moments-page">

    <div class="moments-card">

        <div class="badge">Coming Soon</div>

        <h1>Event <em>Moments</em></h1>

        <p>
            Relive the best memories from past events.
            Organizers will soon be able to upload photos and showcase experiences from every event.
        </p>

        <!-- fake gallery preview -->
        <div class="gallery-preview">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>

        <div class="cta">
            <a href="/" class="btn-main">← Back to Home</a>
            <a href="#" class="btn-secondary">🔔 Notify Me</a>
        </div>

    </div>

</section>

</body>
</html>
