<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In | CampusHive</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet" />

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",

                        "error-container": "#93000a",
                        "surface-container-low": "#131a17",
                        "surface-bright": "#313d36",
                        "secondary": "#7fc9a0",
                        "on-secondary": "#08311c",
                        "primary-fixed-dim": "#4edea3",
                        "outline-variant": "#33453c",
                        "surface-tint": "#4edea3",
                        "on-tertiary-fixed-variant": "#0b513d",
                        "on-tertiary-container": "#004231",
                        "background": "#0a1310",
                        "on-secondary-container": "#c2ecd4",
                        "tertiary": "#95d3ba",
                        "primary": "#4edea3",
                        "surface-container-high": "#212a26",
                        "outline": "#86948a",
                        "secondary-fixed": "#c2ecd4",
                        "on-primary-container": "#00422b",
                        "inverse-primary": "#006c49",
                        "tertiary-container": "#1f5b41",
                        "surface-container-highest": "#2c3631",
                        "on-tertiary": "#003829",
                        "surface-container-lowest": "#05100c",
                        "tertiary-fixed-dim": "#95d3ba",
                        "surface-dim": "#0a1310",
                        "on-secondary-fixed-variant": "#1d5235",
                        "inverse-on-surface": "#22302a",
                        "on-secondary-fixed": "#03210f",
                        "inverse-surface": "#dcebe0",
                        "secondary-container": "#1d5235",
                        "surface": "#0a1310",
                        "on-primary": "#003824",
                        "on-error": "#690005",
                        "on-surface": "#dcebe0",
                        "primary-fixed": "#6ffbbe",
                        "on-surface-variant": "#bbcabf",
                        "secondary-fixed-dim": "#7fc9a0",
                        "on-primary-fixed": "#002113",
                        "on-tertiary-fixed": "#002117",
                        "primary-container": "#10b981",
                        "tertiary-fixed": "#b0f0d6",
                        "on-background": "#dcebe0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",

            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #0a1310;
            color: #dcebe0;
            font-family: 'Inter', sans-serif;
        }

        .hero-mesh {
            background-image: radial-gradient(at 0% 0%, hsla(158, 64%, 52%, 0.10) 0, transparent 50%),
            radial-gradient(at 100% 100%, hsla(158, 64%, 52%, 0.08) 0, transparent 50%);
        }

        input:focus {
            outline: none;
        }
    </style>
</head>

<body class="dark overflow-x-hidden">
<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant">
    <div class="flex justify-between items-center h-16 px-md md:px-lg max-w-container-max mx-auto">
        <a href="/" class="flex items-center gap-3">
            <img src="/images/logo.png" alt="CampusHive Logo" class="w-10 h-10 object-contain"/>
            <span class="text-xl font-bold tracking-tight">
                <span class="text-white">Campus</span><span class="text-primary">Hive</span>
            </span>
        </a>
        <div class="hidden md:flex gap-lg ml-auto items-center">
            <a class="text-on-surface-variant hover:text-primary transition-colors text-body-sm" href="/contact">Contact</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors text-body-sm" href="/aboutUs">About Us</a>
            <a class="text-primary font-semibold text-body-sm" href="/register">Sign Up</a>
        </div>
    </div>
</header>

<main class="pt-16 min-h-screen flex items-center justify-center hero-mesh px-md py-2xl">
    <div class="w-full max-w-md">
        <div class="bg-surface-container border border-outline-variant rounded-xl shadow-2xl p-xl">
            <div class="text-center mb-lg">
                <h1 class="text-headline-md text-on-background mb-xs">Welcome back</h1>
                <p class="text-body-sm text-on-surface-variant">Sign in to manage your campus events.</p>
            </div>

            <!-- Error banner -->
            <div id="error-banner" class="hidden mb-md p-sm rounded-lg bg-error-container border border-error/30 text-on-error-container text-body-sm"></div>

            <a href="/oauth2/authorization/google"
               class="w-full flex items-center justify-center gap-sm border border-outline-variant hover:bg-surface-container-high text-on-surface font-semibold px-lg py-sm rounded-lg transition-all mb-md">
                <svg class="w-5 h-5" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/>
                    <path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.9 14.1-5.1l-6.5-5.5C29.5 35.4 26.9 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.5 5.5C40.9 36.5 44 30.9 44 24c0-1.3-.1-2.7-.4-3.5z"/>
                </svg>
                <span>Continue with Google</span>
            </a>

            <div class="flex items-center gap-sm mb-md">
                <div class="flex-1 h-px bg-outline-variant"></div>
                <span class="text-label-md text-on-surface-variant">OR</span>
                <div class="flex-1 h-px bg-outline-variant"></div>
            </div>

            <form id="login-form" class="space-y-md" novalidate>
                <div>
                    <label for="email" class="block text-body-sm font-medium text-on-surface-variant mb-xs">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary transition-colors"
                           placeholder="abc@gmail.com" />
                </div>
                <div>
                    <label for="password" class="block text-body-sm font-medium text-on-surface-variant mb-xs">Password</label>
                    <input id="password" name="password" type="password" required minlength="8" autocomplete="current-password"
                           class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary transition-colors"
                           placeholder="••••••••" />
                </div>

                <button id="submit-btn" type="submit"
                        class="w-full bg-primary hover:bg-primary-fixed text-on-primary font-bold px-lg py-sm rounded-lg transition-all transform hover:scale-[1.01] shadow-lg shadow-primary/20 mt-sm">
                    Sign In
                </button>
            </form>

            <p class="text-center text-body-sm text-on-surface-variant mt-lg">
                Don't have an account?
                <a href="/register" class="text-primary font-semibold hover:underline">Create one</a>
            </p>
        </div>
    </div>
</main>

<script src="/js/auth.js"></script>
<script>
    const form = document.getElementById("login-form");
    const errorBanner = document.getElementById("error-banner");
    const submitBtn = document.getElementById("submit-btn");

    // Auto-login: if a valid session already exists, skip this page and go to /home.
    checkExistingSessionAndRedirect("/home");

    bindAuthForm({
        formEl: form,
        errorEl: errorBanner,
        buttonEl: submitBtn,
        buttonDefaultText: "Sign In",
        redirectTo: "/home",
        onSubmit: async () => {
            const formData = new FormData(form);
            await loginUser({
                email: formData.get("email").trim(),
                password: formData.get("password"),
            });
        },
    });
</script>
</body>

</html>
