spring.config.activate.on-profile=prod
app.base-url=${BASE_URL}

# ================== DATABASE ==================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=true

# ================== SECURITY ==================
spring.security.user.name=${ADMIN_USERNAME}
spring.security.user.password=${ADMIN_PASSWORD}

# ================== OAUTH ==================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ================== IMAGE STORAGE ==================
cloudinary.cloud_name=${IMAGE_CLOUD_NAME}
cloudinary.api_key=${IMAGE_CLOUD_API_KEY}
cloudinary.api_secret=${IMAGE_CLOUD_SECRET}

# ================== COOKIE SETTINGS ==================
app.cookie.secure=${COOKIE_SECURE}
app.cookie.same-site=${COOKIE_SITE}

# ================== OPENAPI DOCUMENTATION ==============
springdoc.api-docs.enabled=${API_DOC}
springdoc.swagger-ui.enabled=${SWAGGER_UI}