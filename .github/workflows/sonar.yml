name: Sonar

on:
push:
branches:
  - main
  - "*"

jobs:
sonar:
runs-on: ubuntu-latest
  
  ```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '21'

  - run: ./mvnw clean verify sonar:sonar \
      -Dsonar.host.url=https://sonarcloud.io
  ```
